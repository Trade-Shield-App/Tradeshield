<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Client Dashboard — TradeShield</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#05090f;--sf:#0b1220;--sf2:#111d30;--sf3:#172236;--gold:#f0a500;--gold2:#ffc140;--ga15:rgba(240,165,0,.15);--ga25:rgba(240,165,0,.25);--jade:#00c285;--ja12:rgba(0,194,133,.12);--ruby:#f03a3a;--ink:#d8e4f0;--mist:#6b849e;--sb:260px}
    body{font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh}
    /* SIDEBAR */
    aside{width:var(--sb);background:var(--sf);border-right:1px solid var(--ga25);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
    .sb-logo{padding:24px;border-bottom:1px solid var(--ga25)}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .shield{width:30px;height:34px;background:var(--gold);clip-path:polygon(50% 0%,100% 20%,100% 70%,50% 100%,0% 70%,0% 20%);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--bg)}
    .wordmark{font-family:'Syne',sans-serif;font-weight:800;font-size:19px}
    .wordmark b{color:var(--gold)}
    .sb-nav{flex:1;padding:18px 10px}
    .ni{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:9px;color:var(--mist);font-size:13.5px;font-weight:500;transition:all .15s;margin-bottom:3px;cursor:pointer;border:none;background:none;font-family:'Epilogue',sans-serif;width:100%;text-align:left}
    .ni:hover{background:var(--ga15);color:var(--ink)}
    .ni.on{background:var(--ga15);color:var(--gold);border:1px solid var(--ga25)}
    .sb-user{padding:18px 22px;border-top:1px solid var(--ga25)}
    .su-row{display:flex;align-items:center;gap:11px}
    .su-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#e87000);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--bg);flex-shrink:0}
    .su-name{font-size:13.5px;font-weight:600}
    .su-type{font-size:11px;color:var(--mist)}
    /* MAIN */
    main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column}
    .topbar{background:var(--sf);border-bottom:1px solid var(--ga25);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
    .tb-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px}
    .tb-right{display:flex;gap:10px}
    .btn{padding:9px 18px;border-radius:8px;font-family:'Epilogue',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
    .btn-gold{background:var(--gold);color:var(--bg)}
    .btn-gold:hover{background:var(--gold2)}
    .btn-out{background:transparent;border:1px solid var(--ga25);color:var(--ink)}
    .btn-out:hover{border-color:var(--gold);color:var(--gold)}
    .content{padding:28px 32px;flex:1}
    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .sc{background:var(--sf);border:1px solid var(--ga25);border-radius:13px;padding:20px}
    .sc-label{font-size:11px;color:var(--mist);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px}
    .sc-val{font-family:'Syne',sans-serif;font-weight:800;font-size:34px;letter-spacing:-1px;color:var(--gold)}
    .sc-sub{font-size:11px;color:var(--mist);margin-top:3px}
    /* TABS */
    .tabs{display:flex;gap:3px;margin-bottom:18px;background:var(--sf);border-radius:9px;padding:4px;width:fit-content;border:1px solid var(--ga25)}
    .tab{padding:7px 16px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--mist);font-family:'Epilogue',sans-serif;transition:all .15s}
    .tab.on{background:var(--gold);color:var(--bg)}
    /* JOB CARDS */
    .jobs{display:flex;flex-direction:column;gap:12px}
    .jc{background:var(--sf);border:1px solid var(--ga25);border-radius:13px;padding:22px;transition:border-color .15s}
    .jc:hover{border-color:rgba(240,165,0,.45)}
    .jc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .jc-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:5px}
    .jc-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mist)}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
    .c-open{background:var(--ja12);color:var(--jade);border:1px solid rgba(0,194,133,.3)}
    .c-prog{background:var(--ga15);color:var(--gold);border:1px solid var(--ga25)}
    .c-rev{background:rgba(99,102,241,.12);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}
    .c-done{background:rgba(107,132,158,.12);color:var(--mist);border:1px solid rgba(107,132,158,.25)}
    .jc-desc{font-size:13px;color:var(--mist);line-height:1.6;margin-bottom:14px}
    /* BIDS */
    .bids-wrap{margin-top:14px}
    .bids-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mist);margin-bottom:9px}
    .bids-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px}
    .bid{background:var(--sf2);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:13px}
    .bid-name{font-size:12.5px;font-weight:700;margin-bottom:2px}
    .bid-badge{font-size:10.5px;color:var(--jade);font-weight:600}
    .bid-rating{font-size:10.5px;color:var(--gold)}
    .bid-new{font-size:10.5px;color:var(--mist)}
    .bid-amt{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;color:var(--gold);margin:5px 0}
    .bid-dur{font-size:11px;color:var(--mist)}
    .bid-msg{font-size:11.5px;color:var(--mist);margin-top:5px;line-height:1.5}
    .bid-actions{display:flex;gap:7px;margin-top:9px}
    .ba{padding:7px 13px;border-radius:7px;font-family:'Epilogue',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
    .ba-acc{background:var(--jade);color:var(--bg)}
    .ba-dec{background:transparent;border:1px solid rgba(240,58,58,.3);color:var(--ruby)}
    /* ACTIONS */
    .jc-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.05)}
    .btn-rel{padding:9px 18px;background:var(--jade);border:none;border-radius:8px;color:var(--bg);font-family:'Epilogue',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
    .btn-dis{padding:9px 16px;background:transparent;border:1px solid rgba(240,58,58,.3);border-radius:8px;color:var(--ruby);font-family:'Epilogue',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
    /* ESCROW NOTE */
    .esc-note{background:var(--ga15);border:1px solid var(--ga25);border-radius:8px;padding:11px 14px;font-size:12px;color:var(--mist);margin-top:10px;line-height:1.55}
    /* EMPTY */
    .empty{text-align:center;padding:56px 20px;color:var(--mist)}
    .empty-ic{font-size:44px;display:block;margin-bottom:14px}
    .empty-t{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--ink);margin-bottom:8px}
    .empty-d{font-size:13.5px;margin-bottom:22px;line-height:1.6}
    /* MODAL */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-bg.open{display:flex}
    .modal{background:var(--sf);border:1px solid var(--ga25);border-radius:20px;padding:32px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
    .modal h2{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.5px;margin-bottom:22px}
    .fg{margin-bottom:14px}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:block;font-size:11px;font-weight:700;color:var(--mist);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    input,select,textarea{width:100%;padding:11px 13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--ink);font-family:'Epilogue',sans-serif;font-size:13.5px;outline:none;transition:border-color .15s}
    input:focus,select:focus,textarea:focus{border-color:var(--gold)}
    textarea{resize:vertical;min-height:84px}
    select option{background:var(--sf)}
    .m-actions{display:flex;gap:10px;margin-top:6px}
    .m-actions .btn{flex:1;justify-content:center;padding:13px}
    .toast{position:fixed;top:20px;right:20px;background:var(--sf);border:1px solid var(--ga25);border-radius:12px;padding:13px 16px;font-size:13px;display:none;z-index:999;max-width:310px}
    .toast.show{display:block;animation:si .25s ease}
    .toast.ok{border-color:var(--jade);color:var(--jade)}
    .toast.err{border-color:var(--ruby);color:var(--ruby)}
    @keyframes si{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
    @media(max-width:768px){aside{display:none}main{margin-left:0}.stats{grid-template-columns:1fr 1fr}.content{padding:16px}}
  </style>
</head>
<body>
<aside>
  <div class="sb-logo"><a href="index.html" class="logo"><div class="shield">✓</div><span class="wordmark">Trade<b>Shield</b></span></a></div>
  <nav class="sb-nav">
    <button class="ni on"><span>📊</span> Overview</button>
    <button class="ni"><span>📋</span> My Jobs</button>
    <button class="ni"><span>🔒</span> Escrow</button>
    <button class="ni"><span>💬</span> Messages</button>
    <button class="ni"><span>⚙️</span> Settings</button>
  </nav>
  <div class="sb-user">
    <div class="su-row">
      <div class="su-av" id="av">?</div>
      <div><div class="su-name" id="uname">Loading...</div><div class="su-type">Client Account</div></div>
    </div>
  </div>
</aside>

<main>
  <div class="topbar">
    <div class="tb-title">My Jobs</div>
    <div class="tb-right">
      <button class="btn btn-gold" onclick="openModal()">+ Post a Job</button>
      <button class="btn btn-out" onclick="signOut()">Sign Out</button>
    </div>
  </div>
  <div class="content">
    <div class="stats">
      <div class="sc"><div class="sc-label">Active Jobs</div><div class="sc-val" id="s-act">—</div><div class="sc-sub">In progress</div></div>
      <div class="sc"><div class="sc-label">In Escrow</div><div class="sc-val" id="s-esc">—</div><div class="sc-sub">Locked by Stripe</div></div>
      <div class="sc"><div class="sc-label">Completed</div><div class="sc-val" id="s-cmp">—</div><div class="sc-sub">All time</div></div>
      <div class="sc"><div class="sc-label">Total Spent</div><div class="sc-val" id="s-spt">—</div><div class="sc-sub">Released to traders</div></div>
    </div>

    <div class="tabs">
      <button class="tab on" onclick="filter('all',this)">All</button>
      <button class="tab" onclick="filter('open',this)">Open</button>
      <button class="tab" onclick="filter('in_progress',this)">In Progress</button>
      <button class="tab" onclick="filter('review',this)">Awaiting Approval</button>
      <button class="tab" onclick="filter('completed',this)">Completed</button>
    </div>

    <div class="jobs" id="jobs">
      <div class="empty"><span class="empty-ic">⏳</span><div class="empty-t">Loading...</div></div>
    </div>
  </div>
</main>

<!-- POST JOB MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>📋 Post a Job</h2>
    <form id="post-form">
      <div class="fg"><label>Job Title</label><input id="f-title" placeholder="e.g. Replace bathroom suite" required/></div>
      <div class="fg">
        <label>Trade Category</label>
        <select id="f-cat" required>
          <option value="">Select category...</option>
          <option value="plumbing">Plumbing</option>
          <option value="electrical">Electrical</option>
          <option value="building">Building & Construction</option>
          <option value="roofing">Roofing</option>
          <option value="carpentry">Carpentry & Joinery</option>
          <option value="painting">Painting & Decorating</option>
          <option value="gas">Gas & Heating</option>
          <option value="landscaping">Landscaping & Gardening</option>
          <option value="tiling">Tiling</option>
          <option value="plastering">Plastering</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="fg"><label>Description</label><textarea id="f-desc" placeholder="Describe the work in detail. Include access information, materials needed, and anything that will help traders give an accurate quote." required></textarea></div>
      <div class="frow">
        <div class="fg"><label>Budget (£)</label><input id="f-budget" type="number" min="50" placeholder="500" required/></div>
        <div class="fg"><label>Postcode</label><input id="f-pc" placeholder="M1 1AB" required/></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Start Date (approx)</label><input id="f-start" type="date" required/></div>
        <div class="fg">
          <label>Urgency</label>
          <select id="f-urg">
            <option value="flexible">Flexible</option>
            <option value="within_week">Within a week</option>
            <option value="urgent">Urgent (1–2 days)</option>
          </select>
        </div>
      </div>
      <div class="m-actions">
        <button type="button" class="btn btn-out" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-gold" id="post-btn">Post Job →</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL = 'https://skyitcjveafnslkjntre.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNreWl0Y2p2ZWFmbnNsa2pudHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjY3MDQsImV4cCI6MjA4OTYwMjcwNH0.f6VkdEIWc2MPwWFc0Tzs83_GWot_AT3dOZt-aJF1kc4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let user = null, allJobs = [];
const chips = {open:'<span class="chip c-open">🟢 Open</span>',in_progress:'<span class="chip c-prog">🔒 In Progress</span>',review:'<span class="chip c-rev">👀 Awaiting Approval</span>',completed:'<span class="chip c-done">✅ Done</span>',cancelled:'<span class="chip c-done">Cancelled</span>'};

async function init() {
  const {data:{user:u}} = await sb.auth.getUser();
  if (!u) { window.location.href='login.html'; return; }
  user = u;
  const m = u.user_metadata;
  const ini = ((m.first_name?.[0]||'')+(m.last_name?.[0]||'')).toUpperCase()||'?';
  document.getElementById('av').textContent = ini;
  document.getElementById('uname').textContent = m.full_name || u.email;
  await load();
  subscribe();
}

async function load() {
  const {data,error} = await sb.from('jobs')
    .select('*,bids(*,profiles(first_name,last_name,trade,insurance_verified,rating_avg,rating_count))')
    .eq('client_id',user.id).order('created_at',{ascending:false});
  if (error) { toast('Error: '+error.message,'err'); return; }
  allJobs = data||[];
  stats(); render(allJobs);
}

function stats() {
  const act = allJobs.filter(j=>j.status==='in_progress').length;
  const cmp = allJobs.filter(j=>j.status==='completed').length;
  const esc = allJobs.filter(j=>['in_progress','review'].includes(j.status)).reduce((s,j)=>s+(j.escrow_amount||j.budget||0),0);
  const spt = allJobs.filter(j=>j.status==='completed').reduce((s,j)=>s+(j.final_price||j.budget||0),0);
  document.getElementById('s-act').textContent=act;
  document.getElementById('s-cmp').textContent=cmp;
  document.getElementById('s-esc').textContent='£'+esc.toLocaleString();
  document.getElementById('s-spt').textContent='£'+spt.toLocaleString();
}

function render(jobs) {
  const el = document.getElementById('jobs');
  if (!jobs.length) {
    el.innerHTML=`<div class="empty"><span class="empty-ic">🔨</span><div class="empty-t">No jobs here yet</div><p class="empty-d">Post your first job and start receiving bids from verified, insured tradespeople.</p><button class="btn btn-gold" onclick="openModal()">+ Post a Job</button></div>`;
    return;
  }
  el.innerHTML = jobs.map(job => {
    const bids = job.bids||[];
    const pending = bids.filter(b=>b.status==='pending');
    const accepted = bids.find(b=>b.status==='accepted');

    const bidsHtml = (job.status==='open' && pending.length>0) ? `
      <div class="bids-wrap">
        <div class="bids-label">${pending.length} Bid${pending.length!==1?'s':''} Received</div>
        <div class="bids-grid">
          ${pending.map(b=>`
            <div class="bid">
              <div class="bid-name">${b.profiles?.first_name||'Trader'} ${b.profiles?.last_name?.[0]||''}.
                ${b.profiles?.insurance_verified?'<span class="bid-badge">🛡️ Insured</span>':''}
              </div>
              ${b.profiles?.rating_count>0?`<div class="bid-rating">★ ${b.profiles.rating_avg} (${b.profiles.rating_count})</div>`:`<div class="bid-new">New trader</div>`}
              <div class="bid-amt">£${b.amount?.toLocaleString()}</div>
              <div class="bid-dur">⏱ ${b.duration||'Not specified'}</div>
              ${b.message?`<div class="bid-msg">"${b.message.substring(0,100)}${b.message.length>100?'...':''}"</div>`:''}
              <div class="bid-actions">
                <button class="ba ba-acc" onclick="acceptBid('${job.id}','${b.id}',${b.amount})">Accept</button>
                <button class="ba ba-dec" onclick="declineBid('${b.id}')">Decline</button>
              </div>
            </div>`).join('')}
        </div>
      </div>` : '';

    const escNote = accepted ? `<div class="esc-note">🔒 £${accepted.amount?.toLocaleString()} locked in escrow · Assigned to ${accepted.profiles?.first_name||'Trader'}${accepted.profiles?.insurance_verified?' · 🛡️ Insured':''}</div>` : '';

    const actions = (job.status==='review'||job.status==='completed'||(job.status==='open'&&!pending.length)) ? `
      <div class="jc-actions">
        ${job.status==='review'?`<button class="btn-rel" onclick="approve('${job.id}')">✅ Approve & Release Payment</button><button class="btn-dis" onclick="dispute('${job.id}')">⚠️ Raise Dispute</button>`:''}
        ${job.status==='completed'&&!job.client_reviewed?`<a href="review.html?job_id=${job.id}" class="btn btn-gold">⭐ Leave a Review</a>`:''}
        ${job.status==='open'&&!pending.length?`<button class="btn btn-out" style="border-color:rgba(240,58,58,.3);color:var(--ruby)" onclick="del('${job.id}')">Delete Job</button>`:''}
      </div>` : '';

    return `<div class="jc" id="j-${job.id}">
      <div class="jc-top">
        <div>
          <div class="jc-title">${job.title}</div>
          <div class="jc-meta"><span>📍 ${job.postcode}</span><span>🏷️ ${job.category}</span><span>💷 £${job.budget?.toLocaleString()}</span><span>📅 ${new Date(job.created_at).toLocaleDateString('en-GB')}</span>${bids.length?`<span>💬 ${bids.length} bid${bids.length!==1?'s':''}</span>`:''}</div>
        </div>
        ${chips[job.status]||''}
      </div>
      <p class="jc-desc">${job.description?.substring(0,180)}${(job.description?.length||0)>180?'...':''}</p>
      ${escNote}${bidsHtml}${actions}
    </div>`;
  }).join('');
}

function filter(s,btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  render(s==='all'?allJobs:allJobs.filter(j=>j.status===s));
}

async function acceptBid(jobId,bidId,amount) {
  if (!confirm(`Accept this bid for £${amount?.toLocaleString()}?\n\nThe full amount will be locked in escrow via Stripe before the trader starts work.`)) return;
  toast('Locking payment in escrow...','ok');
  const {data,error} = await sb.functions.invoke('create-escrow',{body:{job_id:jobId,bid_id:bidId}});
  if (error) { toast('Error: '+error.message,'err'); return; }
  if (data?.client_secret) { window.location.href=`payment.html?secret=${data.client_secret}&job_id=${jobId}`; }
  else { await load(); toast('✅ Bid accepted — escrow locked.','ok'); }
}

async function declineBid(bidId) {
  await sb.from('bids').update({status:'rejected'}).eq('id',bidId);
  await load();
}

async function approve(jobId) {
  if (!confirm('Are you satisfied with the work?\n\nApproving will release payment to the trader and unlock reviews for both parties.')) return;
  const {error} = await sb.functions.invoke('release-payment',{body:{job_id:jobId}});
  if (error) { toast('Error: '+error.message,'err'); return; }
  toast('✅ Payment released. You can now leave a review.','ok');
  await load();
}

async function dispute(jobId) {
  const reason = prompt('Briefly describe the issue. Our team will contact you within 24 hours:');
  if (!reason?.trim()) return;
  await sb.from('disputes').insert({job_id:jobId,raised_by:user.id,reason:reason.trim(),status:'open'});
  toast('Dispute raised — our team will be in touch within 24 hours.','ok');
}

async function del(jobId) {
  if (!confirm('Delete this job? This cannot be undone.')) return;
  await sb.from('jobs').delete().eq('id',jobId);
  await load();
}

function subscribe() {
  sb.channel('client-updates')
    .on('postgres_changes',{event:'*',schema:'public',table:'jobs',filter:`client_id=eq.${user.id}`},load)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'bids'},load)
    .subscribe();
}

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

document.getElementById('post-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('post-btn');
  btn.disabled=true; btn.textContent='Posting...';
  const {error} = await sb.from('jobs').insert({
    client_id:user.id,
    title:document.getElementById('f-title').value.trim(),
    category:document.getElementById('f-cat').value,
    description:document.getElementById('f-desc').value.trim(),
    budget:parseFloat(document.getElementById('f-budget').value),
    postcode:document.getElementById('f-pc').value.trim().toUpperCase(),
    start_date:document.getElementById('f-start').value,
    urgency:document.getElementById('f-urg').value,
    status:'open',
    client_can_review:false,
    trader_can_review:false,
  });
  if (error) { toast('Error: '+error.message,'err'); }
  else { toast('✅ Job posted — traders will start bidding soon.','ok'); closeModal(); document.getElementById('post-form').reset(); await load(); }
  btn.disabled=false; btn.textContent='Post Job →';
});

async function signOut() { await sb.auth.signOut(); window.location.href='index.html'; }
function toast(msg,type) { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.classList.remove('show'),5000); }

init();
</script>
</body>
</html>
